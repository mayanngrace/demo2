<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community — CampusConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --maroon: #7b1113; --maroon-dark: #5a0c0e; --maroon-deep: #3d0608;
      --maroon-mid: #9e1517; --maroon-light: #f5eaea;
      --gold: #f5a623; --gold-light: #fff8ed;
      --white: #ffffff; --bg: #f4f0f0; --text: #1a0a0b;
      --muted: #8a7070; --border: #ecdede; --sidebar-w: 72px;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: linear-gradient(180deg, var(--maroon-deep) 0%, var(--maroon-dark) 60%, var(--maroon) 100%); position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; padding: 1.25rem 0; z-index: 100; }
    .sidebar-logo { width: 42px; height: 42px; background: var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; color: var(--maroon-deep); margin-bottom: 2rem; box-shadow: 0 4px 12px rgba(245,166,35,0.4); text-decoration: none; }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; width: 100%; padding: 0 0.6rem; }
    .nav-item { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.75rem 0; border-radius: 12px; cursor: pointer; color: rgba(255,255,255,0.45); font-size: 1.2rem; text-decoration: none; transition: all 0.2s; position: relative; }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-item.active::before { content: ''; position: absolute; left: -0.6rem; top: 50%; transform: translateY(-50%); width: 4px; height: 28px; background: var(--gold); border-radius: 0 4px 4px 0; }
    .nav-item span { font-size: 0.52rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 0.2rem; }
    .sidebar-bottom { padding: 0 0.6rem; width: 100%; }
    .logout-icon { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0.75rem 0; border-radius: 12px; color: rgba(255,255,255,0.35); font-size: 1.2rem; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .logout-icon span { font-size: 0.52rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 0.2rem; }
    .logout-icon:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }

    /* MAIN */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 1.5rem; min-height: 100vh; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .icon-btn { width: 40px; height: 40px; background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; transition: all 0.15s; color: var(--muted); text-decoration: none; }
    .icon-btn:hover { border-color: var(--maroon); color: var(--maroon); }
    .avatar-btn { display: flex; align-items: center; gap: 0.5rem; background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.4rem 0.75rem 0.4rem 0.4rem; cursor: pointer; transition: all 0.15s; }
    .avatar-btn:hover { border-color: var(--maroon); }
    .avatar-circle { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--maroon-mid), var(--maroon-dark)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.75rem; font-weight: 700; }
    .avatar-name { font-size: 0.82rem; font-weight: 600; }
    .role-chip { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 20px; }
    .role-chip.student { background: var(--maroon-light); color: var(--maroon); }
    .role-chip.admin { background: #edf5f0; color: #2a6b4a; }

    /* PAGE CONTENT */
    .section-label { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }

    /* CREATE PANEL */
    .create-panel { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; display: none; }
    .create-panel h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 1rem; color: var(--maroon); }
    .create-row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    .create-row .form-group { flex: 1; min-width: 140px; margin-bottom: 0; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input[type="text"], select { width: 100%; padding: 0.6rem 0.85rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--white); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, select:focus { border-color: var(--maroon); box-shadow: 0 0 0 3px var(--maroon-light); }

    /* TOOLBAR */
    .toolbar { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 1rem 1.25rem; display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
    .toolbar .form-group { margin-bottom: 0; flex: 1; min-width: 150px; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.1rem; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: linear-gradient(135deg, var(--maroon-mid), var(--maroon-dark)); color: #fff; box-shadow: 0 4px 12px rgba(123,17,19,0.25); }
    .btn-primary:hover { box-shadow: 0 6px 18px rgba(123,17,19,0.35); transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
    .btn-outline:hover { background: var(--bg); }
    .btn-danger { background: transparent; color: var(--maroon); border-color: #f5c6bc; font-size: 0.75rem; padding: 0.35rem 0.75rem; }
    .btn-danger:hover { background: var(--maroon); color: #fff; }

    /* RESULTS BAR */
    .results-bar { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; padding: 0 0.25rem; }

    /* POST LIST */
    .post-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .post-item { background: var(--white); border: 1.5px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.15s, box-shadow 0.15s; animation: slideIn 0.18s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .post-item:hover { border-color: #d4b8b8; box-shadow: 0 4px 16px rgba(123,17,19,0.08); }
    .post-info { flex: 1; }
    .post-title { font-weight: 600; font-size: 0.92rem; }
    .post-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
    .category-tag { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.22rem 0.65rem; border-radius: 20px; white-space: nowrap; }
    .tag-task { background: #fff3e0; color: #a05e0a; }
    .tag-service { background: #edf5f0; color: #2a6b4a; }
    .tag-selling { background: #edf2fb; color: #2563a8; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.35; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <a href="/" class="sidebar-logo">CC</a>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item">🏠<span>Home</span></a>
      <a href="/community" class="nav-item active">💬<span>Posts</span></a>
      <a href="/courses" class="nav-item hide-for-admin">📚<span>Courses</span></a>
      <a href="/student" class="nav-item hide-for-admin">👤<span>Profile</span></a>
      <a href="/about" class="nav-item">ℹ️<span>About</span></a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/logout" class="logout-icon">🚪<span>Logout</span></a>
    </div>
  </aside>

  <main class="main">

    <div class="topbar">
      <div class="topbar-title">💬 Community Board</div>
      <div class="topbar-right">
        <div class="icon-btn">🔔</div>
        <div class="icon-btn">⚙️</div>
        <div class="avatar-btn">
          <div class="avatar-circle" id="avatarInitial">S</div>
          <span class="avatar-name" id="avatarName">Student</span>
          <span class="role-chip student" id="roleBadge">Student</span>
          <span style="color:var(--muted);font-size:0.7rem;">▾</span>
        </div>
      </div>
    </div>

    <!-- CREATE PANEL (student only) -->
    <div class="create-panel" id="createPanel">
      <h3>✏️ New Post</h3>
      <div class="create-row">
        <div class="form-group">
          <label class="form-label">Post Title</label>
          <input type="text" id="newTitle" placeholder="What's on your mind?">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="newCategory">
            <option value="Task">Task</option>
            <option value="Service">Service</option>
            <option value="Selling">Selling</option>
          </select>
        </div>
        <div>
          <button class="btn btn-primary" onclick="addPost()">Post →</button>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="form-group">
        <label class="form-label">🔍 Search by title</label>
        <input type="text" id="searchInput" placeholder="Type to search..." oninput="applyFilters()">
      </div>
      <div class="form-group">
        <label class="form-label">Filter by category</label>
        <select id="filterCategory" onchange="applyFilters()">
          <option value="All">All Categories</option>
          <option value="Task">Task</option>
          <option value="Service">Service</option>
          <option value="Selling">Selling</option>
        </select>
      </div>
      <div>
        <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="results-bar" id="resultsCount">Loading posts...</div>
    <div class="post-list" id="postList"></div>

  </main>

  <script src="/js/community.js?v=5"></script>
</body>
</html>
